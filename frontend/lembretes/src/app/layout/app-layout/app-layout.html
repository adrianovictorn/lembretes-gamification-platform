<div class="grid grid-cols-1 bg-slate-900 md:grid-cols-[250px_1fr] grid-rows-[auto_1fr] h-full">
    
    <app-sidebar-layout class="hidden md:block row-span-2  p-2 "></app-sidebar-layout>
    <app-header-layout class="z-30 p-4" (toggleMenu)="isMenuOpen = !isMenuOpen"></app-header-layout>
    <main class="border bg-slate-950/95 dark:border-gray-white p-6 ">
            <router-outlet></router-outlet>
    </main>

    @if (isMenuOpen) {
        <div class=" fixed inset-0 z-40 md:hidden">
            <div class="absolute inset-0 bg-black/40" (click)="isMenuOpen = false"></div>

            <div class="absolute left-0 top-0 h-full p-2 w-72 bg-gray-900 shadow" (click)="$event.stopPropagation()">

                <app-sidebar-layout></app-sidebar-layout>
            </div>
        </div>

    }
</div>
